<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafikiukas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #eafff2;
    --surface: #ffffff;
    --surface2: #d0f5e2;
    --lime: #d4f542;
    --violet: #5b35d5;
    --violet-light: #ede9ff;
    --green: #2d9e5f;
    --red: #e03535;
    --text: #1a1a2e;
    --muted: #777788;
    --border: #ddddd0;
    --grid: #fafafa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before { display: none; }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

  /* ─── HEADER ─── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 2px solid var(--text); margin-bottom: 24px;
  }
  .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--violet); }

  .hud { display: flex; gap: 10px; align-items: center; }
  .badge {
    background: var(--lime); border: 2px solid var(--violet);
    border-radius: 99px; padding: 6px 14px;
    font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--violet);
    display: flex; align-items: center; gap: 6px; font-weight: 700;
  }
  .badge .val { color: var(--violet); }

  /* ─── PROGRESS BAR ─── */
  .progress-wrap { margin-bottom: 20px; }
  .progress-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; }
  .progress-track { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--lime); border-right: 2px solid var(--violet); transition: width .5s ease; }

  /* ─── SCREEN: MENU ─── */
  #screen-menu { text-align: center; padding: 20px 0; }
  .title-big { font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; line-height: 1.1; letter-spacing: -1px; margin-bottom: 12px; color: var(--text); }
  .title-big em { font-style: normal; color: var(--violet); }
  .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 36px; }

  .levels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .level-card {
    background: var(--surface); border: 2px solid var(--text); border-radius: 20px;
    padding: 20px; cursor: pointer; text-align: left; transition: all .18s;
    position: relative; overflow: hidden;
  }
  .level-card:hover { background: var(--lime); transform: translateY(-3px); box-shadow: 4px 4px 0 var(--violet); }
  .level-card.locked { opacity: .45; cursor: not-allowed; pointer-events: none; border-color: var(--border); }
  .level-card.completed { background: var(--lime); border-color: var(--violet); }
  .level-num { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .level-name { font-weight: 800; font-size: 1rem; margin-bottom: 4px; color: var(--text); }
  .level-desc { font-size: 0.78rem; color: var(--muted); }
  .level-stars { position: absolute; top: 14px; right: 14px; font-size: 0.85rem; }
  .level-tag {
    display: inline-block; margin-top: 10px; font-size: 0.68rem; font-family: 'Space Mono', monospace;
    padding: 3px 10px; border-radius: 99px; background: var(--violet-light); color: var(--violet); border: 1px solid var(--violet); font-weight: 700;
  }
  .level-card.completed .level-tag { background: var(--violet); color: #fff; }

  /* ─── SCREEN: GAME ─── */
  #screen-game { display: none; }
  .game-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .level-title { font-size: 1.2rem; font-weight: 800; }
  .btn-back {
    background: var(--lime); border: 2px solid var(--violet); color: var(--violet);
    padding: 8px 16px; border-radius: 99px; cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; font-weight: 700; transition: all .18s;
  }
  .btn-back:hover { background: var(--violet); color: #fff; }

  .task-card { background: var(--surface); border: 2px solid var(--text); border-radius: 20px; padding: 20px; margin-bottom: 14px; }
  .task-label { font-size: 0.7rem; color: var(--violet); font-family: 'Space Mono', monospace; margin-bottom: 8px; letter-spacing: 1px; font-weight: 700; }
  .task-text { font-size: 1.05rem; font-weight: 700; line-height: 1.4; }
  .task-formula { font-family: 'Space Mono', monospace; font-size: 0.95rem; color: var(--violet); margin-top: 8px; font-weight: 700; }

  /* ─── CANVAS ─── */
  .canvas-wrap { position: relative; background: var(--grid); border: 2px solid var(--text); border-radius: 20px; overflow: hidden; margin-bottom: 14px; }
  canvas { display: block; width: 100%; touch-action: none; }

  .canvas-legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid var(--border); font-size: 0.78rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.72rem; }
  .dot { width: 10px; height: 10px; border-radius: 99px; }

  /* ─── OPTIONS ─── */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .opt-btn {
    background: var(--surface); border: 2px solid var(--text); border-radius: 16px;
    padding: 14px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 0.82rem;
    color: var(--text); text-align: center; transition: all .18s; line-height: 1.3; font-weight: 700;
  }
  .opt-btn:hover { background: var(--lime); border-color: var(--violet); color: var(--violet); transform: translateY(-1px); }
  .opt-btn.correct { border-color: var(--green); background: #d4fce8; color: var(--green); }
  .opt-btn.wrong { border-color: var(--red); background: #ffe4e4; color: var(--red); }
  .opt-btn:disabled { cursor: not-allowed; transform: none; }

  /* ─── FEEDBACK ─── */
  .feedback { border-radius: 16px; padding: 14px 18px; margin-bottom: 14px; display: none; font-size: 0.9rem; border: 2px solid; }
  .feedback.show { display: block; }
  .feedback.ok { background: #d4fce8; border-color: var(--green); color: #1a6640; }
  .feedback.fail { background: #ffe4e4; border-color: var(--red); color: #a01010; }
  .feedback strong { font-weight: 800; }

  .btn-next {
    width: 100%; padding: 15px; background: var(--lime); color: var(--violet);
    border: 2px solid var(--violet); border-radius: 99px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 1rem; cursor: pointer; transition: all .18s; display: none;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .btn-next:hover { background: var(--violet); color: #fff; }
  .btn-next.show { display: block; }

  /* ─── SCREEN: RESULTS ─── */
  #screen-result { display: none; text-align: center; padding: 30px 0; }
  .result-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
  .result-stars { font-size: 2.5rem; margin: 16px 0; }
  .result-score { font-family: 'Space Mono', monospace; font-size: 1.1rem; color: var(--violet); margin-bottom: 24px; font-weight: 700; }
  .result-explanation { background: var(--surface); border: 2px solid var(--text); border-radius: 20px; padding: 18px; margin-bottom: 24px; text-align: left; font-size: 0.9rem; color: var(--muted); line-height: 1.7; }
  .result-explanation h3 { color: var(--text); font-size: 1rem; margin-bottom: 10px; font-weight: 800; }
  .result-btns { display: flex; gap: 12px; justify-content: center; }
  .btn-primary {
    padding: 13px 28px; background: var(--lime); color: var(--violet);
    border: 2px solid var(--violet); border-radius: 99px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: all .18s; text-transform: uppercase;
  }
  .btn-primary:hover { background: var(--violet); color: #fff; }
  .btn-secondary {
    padding: 13px 28px; background: var(--surface); border: 2px solid var(--text);
    color: var(--text); border-radius: 99px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: all .18s; text-transform: uppercase;
  }
  .btn-secondary:hover { border-color: var(--violet); color: var(--violet); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; top: 20px; right: 20px;
    background: var(--lime); border: 2px solid var(--violet); color: var(--violet);
    border-radius: 99px; padding: 10px 20px; font-size: 0.85rem; font-weight: 800;
    transform: translateX(200%); transition: transform .3s; z-index: 999;
  }
  .toast.show { transform: translateX(0); }


  /* ─── THEORY CARD ─── */
  .theory-card {
    background: #fffbe6; border: 2px solid var(--violet); border-radius: 16px;
    padding: 14px 18px; margin-bottom: 14px; font-size: 0.92rem; line-height: 1.5;
    color: #3d2a00; animation: slideDown .3s ease;
  }
  .theory-card .theory-icon { font-size: 1.2rem; margin-right: 6px; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

  /* ─── BUBBLE ─── */
  .bubble-wrap {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-60%);
    z-index: 9999; pointer-events: none; text-align: center;
    animation: bubblePop .4s cubic-bezier(.175,.885,.32,1.275);
    display: none;
  }
  .bubble-wrap.show { display: block; }
  .bubble {
    background: white; border: 3px solid var(--violet); border-radius: 24px;
    padding: 18px 28px; font-size: 1.3rem; font-weight: 900; color: var(--violet);
    box-shadow: 0 8px 32px rgba(91,53,213,.25); position: relative;
    font-family: 'Nunito', sans-serif; max-width: 280px;
  }
  .bubble.ok-bubble { border-color: var(--green); color: var(--green); }
  .bubble.fail-bubble { border-color: #e07000; color: #b34f00; }
  .bubble::after {
    content: ''; position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
    border: 8px solid transparent; border-top-color: var(--violet);
  }
  .bubble.ok-bubble::after { border-top-color: var(--green); }
  .bubble.fail-bubble::after { border-top-color: #e07000; }
  .bubble-emoji { font-size: 2.2rem; display: block; margin-bottom: 6px; }
  @keyframes bubblePop { from { opacity:0; transform:translate(-50%,-60%) scale(.5); } to { opacity:1; transform:translate(-50%,-60%) scale(1); } }

  /* ─── CONFETTI ─── */
  .confetti-piece {
    position: fixed; font-size: 1.8rem; z-index: 9998;
    animation: confettiFall 1.4s ease-in forwards;
    pointer-events: none; user-select: none; line-height: 1;
  }
  @keyframes confettiFall {
    0%   { opacity:1; transform: translateY(0) rotate(0deg); }
    100% { opacity:0; transform: translateY(320px) rotate(360deg); }
  }


  /* ─── CALENDLY BTN ─── */
  .consult-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 2px solid var(--border);
    padding: 12px 16px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .consult-bar p {
    font-size: 0.82rem; color: var(--muted); margin: 0; line-height: 1.3;
  }
  .consult-bar strong { color: var(--text); font-weight: 800; }
  .btn-consult {
    background: var(--lime); border: 2px solid var(--violet); color: var(--violet);
    border-radius: 99px; padding: 10px 20px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.88rem; cursor: pointer; white-space: nowrap;
    transition: all .18s; text-decoration: none; display: inline-block;
  }
  .btn-consult:hover { background: var(--violet); color: white; }
  .app { padding-bottom: 80px; }

  /* mobile */
  @media(max-width:500px) {
    .options-grid { grid-template-columns: 1fr; }
    .levels-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

let progress = JSON.parse(localStorage.getItem('gt_progress') || '{}');
let state = { level: null, qIdx: 0, score: 0, answered: false, streak: 0, totalStars: 0 };

function saveProgress() { localStorage.setItem('gt_progress', JSON.stringify(progress)); }
function loadGlobalStats() {
  let s = 0, st = parseInt(localStorage.getItem('gt_streak') || '0');
  LEVELS.forEach(l => { if (progress[l.id]) s += progress[l.id].stars; });
  state.totalStars = s;
  state.streak = st;
  document.getElementById('total-stars').textContent = s;
  document.getElementById('streak').textContent = st;
}

function renderMenu() {
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lvl, i) => {
    const p = progress[lvl.id];
    const locked = i > 0 && !progress[LEVELS[i-1].id];
    const stars = p ? p.stars : 0;
    const starStr = stars > 0 ? '⭐'.repeat(stars) : (locked ? '🔒' : '');
    const cls = locked ? 'locked' : (p ? 'completed' : '');
    const tagText = p ? `✓ Atlikta` : (locked ? 'Užrakinta' : lvl.tag);
    grid.innerHTML += `
      <div class="level-card ${cls}" onclick="startLevel(${lvl.id})">
        <div class="level-num">LYGIS ${i+1}</div>
        <div class="level-name">${lvl.name}</div>
        <div class="level-desc">${lvl.desc}</div>
        <div class="level-stars">${starStr}</div>
        <div class="level-tag">${tagText}</div>
      </div>`;
  });
}

// ════════════════════════════════
//  CANVAS DRAWING
// ════════════════════════════════
function drawGraphs(fn, gn) {
  const canvas = document.getElementById('gc');
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = 300;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  ctx.clearRect(0,0,W,H);

  const scale = Math.min(W, H) / 10;

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,.07)';
  ctx.lineWidth = 1;
  for (let i = -10; i <= 10; i++) {
    ctx.beginPath(); ctx.moveTo(cx+i*scale,0); ctx.lineTo(cx+i*scale,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,cy+i*scale); ctx.lineTo(W,cy+i*scale); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = 'rgba(0,0,0,.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();

  // Axis labels
  ctx.fillStyle = 'rgba(0,0,0,.35)'; ctx.font = '11px Space Mono';
  ctx.fillText('x', W-14, cy-8);
  ctx.fillText('y', cx+8, 14);
  [-4,-3,-2,-1,1,2,3,4].forEach(n => {
    ctx.fillText(n, cx+n*scale-6, cy+16);
    if (n !== 0) ctx.fillText(-n, cx+6, cy+n*scale+4);
  });

  function drawFn(fn, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 2.8; ctx.beginPath();
    let first = true, prevPy = null;
    for (let px = 0; px < W; px++) {
      const x = (px - cx) / scale;
      const y = fn(x);
      if (isNaN(y) || !isFinite(y)) { first = true; continue; }
      const py = cy - y * scale;
      if (py < -20 || py > H + 20) { first = true; prevPy = null; continue; }
      if (prevPy !== null && Math.abs(py - prevPy) > H * 0.8) { first = true; }
      if (first) { ctx.moveTo(px, py); first = false; }
      else ctx.lineTo(px, py);
      prevPy = py;
    }
    ctx.stroke();
  }

  drawFn(fn, 'rgba(22,163,74,.85)');
  drawFn(gn, 'rgba(8,145,178,.9)');
}

//  GAME LOGIC
// ════════════════════════════════
function startLevel(id) {
  const lvl = LEVELS[id];
  state.level = lvl;
  state.qIdx = 0;
  state.score = 0;
  state.answered = false;
  document.getElementById('game-level-name').textContent = lvl.name;
  show('screen-game');
  renderQuestion();
}

function renderQuestion() {
  const lvl = state.level;
  const q = lvl.questions[state.qIdx];
  const total = lvl.questions.length;

  document.getElementById('q-label').textContent = `Klausimas ${state.qIdx+1} / ${total}`;
  document.getElementById('q-score').textContent = `${state.score} taškai`;
  document.getElementById('prog-fill').style.width = `${(state.qIdx/total)*100}%`;

  document.getElementById('task-text').textContent = q.text;
  document.getElementById('task-formula').textContent = q.formula;

  const tc = document.getElementById('theory-card');
  if (q.theory) {
    tc.innerHTML = q.theory;
    tc.style.display = 'block';
    tc.style.animation = 'none';
    tc.offsetHeight;
    tc.style.animation = '';
  } else {
    tc.style.display = 'none';
  }

  drawGraphs(q.fn, q.gn);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    grid.innerHTML += `<button class="opt-btn" onclick="answer(${i})">${opt}</button>`;
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
  state.answered = false;
}

  const msgs = isOk ? WIN_MSGS : FAIL_MSGS;
  const m = msgs[Math.floor(Math.random() * msgs.length)];
  const wrap = document.getElementById('bubble-wrap');
  const bub = document.getElementById('bubble');
  document.getElementById('bubble-emoji').textContent = m.e;
  document.getElementById('bubble-text').textContent = m.t;
  bub.className = 'bubble ' + (isOk ? 'ok-bubble' : 'fail-bubble');
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = '';
  wrap.classList.add('show');
  setTimeout(() => wrap.classList.remove('show'), 1800);
}

function launchConfetti() {
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = '🥕';
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.top = (Math.random() * 20 + 5) + 'vh';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    el.style.animationDuration = (1.1 + Math.random() * 0.8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

function answer(i) {
  if (state.answered) return;
  state.answered = true;
  const q = state.level.questions[state.qIdx];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (i === q.ans) {
    btns[i].classList.add('correct');
    state.score += 10;
    state.streak++;
    localStorage.setItem('gt_streak', state.streak);
    document.getElementById('streak').textContent = state.streak;
    fb.className = 'feedback ok show';
    fb.innerHTML = `<strong>✓ Teisingai!</strong> ${q.explain}`;
    showBubble(true);
    launchConfetti();
    if (state.streak > 1) showToast('🔥 Serija: ' + state.streak + '!');
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    state.streak = 0;
    localStorage.setItem('gt_streak', 0);
    document.getElementById('streak').textContent = 0;
    fb.className = 'feedback fail show';
    fb.innerHTML = `<strong>✗ Neteisingai.</strong> ${q.explain}`;
    showBubble(false);
  }
  document.getElementById('q-score').textContent = `${state.score} taškai`;
  document.getElementById('btn-next').className = 'btn-next show';
}

function nextQuestion() {
  state.qIdx++;
  if (state.qIdx >= state.level.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  const maxScore = state.level.questions.length * 10;
  const pct = state.score / maxScore;
  let stars = pct >= 0.9 ? 3 : pct >= 0.6 ? 2 : 1;

  const prev = progress[state.level.id];
  if (!prev || prev.stars < stars) {
    progress[state.level.id] = { stars };
    saveProgress();
  }

  // unlock next
  const nextIdx = LEVELS.indexOf(state.level) + 1;

  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  const titles = ['Gali geriau!', 'Neblogai!', 'Puikiai!'];
  document.getElementById('res-stars').textContent = starStr;
  document.getElementById('res-title').textContent = titles[stars-1];
  document.getElementById('res-score').textContent = `${state.score} / ${maxScore} taškų`;

  document.getElementById('res-explanation').innerHTML = `
    <h3>📚 Šio lygio apžvalga</h3>
    ${state.level.desc}. Transformacijos formulė: <code>${state.level.tag}</code><br><br>
    ${stars === 3 ? '🏆 Puikus rezultatas! Visi grafikai atpažinti teisingai.' : stars === 2 ? '👍 Geras rezultatas! Pakartok dar kartą, kad įtvirtintum.' : '💪 Rekomenduojama pakartoti. Panagrinėk grafikus atidžiau.'}
    ${nextIdx < LEVELS.length ? '<br><br>✨ Kitas lygis atrakintas: <strong>' + LEVELS[nextIdx].name + '</strong>' : '<br><br>🎓 Visi lygiai atlikti!'}`;

  show('screen-result');
  loadGlobalStats();
}

function retryLevel() { startLevel(state.level.id); }

function goMenu() { show('screen-menu'); renderMenu(); loadGlobalStats(); }

// ════════════════════════════════
//  UTILS
// ════════════════════════════════
function show(id) {
  ['screen-menu','screen-game','screen-result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
window.addEventListener('resize', () => {
  const q = state.level && state.level.questions[state.qIdx];
  if (q && document.getElementById('screen-game').style.display !== 'none') {
    drawGraphs(q.fn, q.gn);
  }
});

loadGlobalStats();
renderMenu();
</script>
</body>
</html>
